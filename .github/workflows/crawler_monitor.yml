name: Crawler Structure Monitor

on:
  schedule:
    # Run daily at 08:00 UTC (16:00 Taiwan time)
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  flutter_version: '3.38.10'

jobs:
  monitor:
    name: Verify School HTML Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - run: flutter pub get
      - name: Run crawler structure check
        run: dart run test/crawler_monitor.dart
        env:
          NSYSU_USERNAME: ${{ secrets.NSYSU_USERNAME }}
          NSYSU_PASSWORD: ${{ secrets.NSYSU_PASSWORD }}
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Crawler Monitor: School HTML structure may have changed';
            const body = `The daily crawler structure monitor detected a possible change in the school's HTML structure.

            **Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            Please check the workflow logs and update the parsers if needed.`;

            // Check if an open issue with the same title already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'crawler-monitor',
            });
            const existing = issues.data.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['crawler-monitor', 'bug'],
              });
            }
