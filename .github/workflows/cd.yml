name: Store CD

on:
  push:
    branches:
      - production
      - develop
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'android/**'
      - 'ios/**'
      - 'macos/**'
      - 'linux/**'
      - 'windows/**'
      - 'assets/**'
      - '.github/workflows/cd.yml'
      - '.github/scripts/**'
  workflow_dispatch:

env:
  flutter_version: '3.41.x'
  java_version: '21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write
  pull-requests: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_code: ${{ steps.get_version_code.outputs.version_code }}
      is_production: ${{ github.ref == 'refs/heads/production' }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      - name: Get version code and bump VERSION_CODE for next run
        id: get_version_code
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CURRENT="${{ vars.VERSION_CODE }}"
          NEXT=$((CURRENT + 1))
          echo "version_code=$CURRENT" >> $GITHUB_OUTPUT
          gh variable set VERSION_CODE --body "$NEXT" --repo "${{ github.repository }}"
          echo "Using version code: $CURRENT (VERSION_CODE bumped to $NEXT for next run)"
      - name: Aggregate changelog from merged PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TYPE=${{ github.ref == 'refs/heads/production' && 'stable' || 'beta' }}
          bash "$GITHUB_WORKSPACE/.github/scripts/aggregate_changelog.sh" "$RELEASE_TYPE" changelog_aggregated.json
      - name: Upload aggregated changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog-aggregated
          path: changelog_aggregated.json

  deploy_android:
    name: Android Play Store
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.java_version }}
      - name: Decrypt Android keys
        run: sh ./.github/scripts/decrypt_android_keys.sh
        env:
          KEYS_SECRET_PASSPHRASE: ${{ secrets.KEYS_SECRET_PASSPHRASE }}
      - name: Download aggregated changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog-aggregated
      - name: Format changelog for Android
        run: bash "$GITHUB_WORKSPACE/.github/scripts/format_changelog.sh" ${{ needs.prepare.outputs.version_code }} android
        working-directory: ./android/fastlane
        env:
          AGGREGATED_CHANGELOG: ${{ github.workspace }}/changelog_aggregated.json
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Install Flutter dependencies
        run: flutter pub get
      - run: flutter build appbundle --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Install Fastlane
        run: gem install fastlane fastlane-plugin-flutter_version
        working-directory: ./android
      - name: Run Fastlane
        run: fastlane ${{ needs.prepare.outputs.is_production == 'true' && 'playstore' || 'beta' }}
        working-directory: ./android

  deploy_ios:
    name: iOS Deploy TestFlight
    needs: prepare
    runs-on: [self-hosted, macOS]
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.java_version }}
      - name: Download aggregated changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog-aggregated
      - name: Format changelog for iOS
        run: bash "$GITHUB_WORKSPACE/.github/scripts/format_changelog.sh" ${{ needs.prepare.outputs.version_code }} ios
        working-directory: ./ios/fastlane
        env:
          AGGREGATED_CHANGELOG: ${{ github.workspace }}/changelog_aggregated.json
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Flutter Initialize
        run: flutter doctor -v
      - run: flutter build ipa --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Zip dSYM
        run: zip Runner.app.dSYM.zip -r ../archive/Runner.xcarchive/dSYMs/
        working-directory: ./build/ios/ipa
      - name: Decode API Key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ios/AuthKey.p8
      - name: Deploy iOS Beta to TestFlight via Fastlane
        run: fastlane ios release key_id:"${{ env.KEY_ID }}" issuer_id:"${{ env.ISSUER_ID }}"
        working-directory: ./ios
        env:
          APP_STORE_CONNECT_TEAM_ID: '${{ secrets.APP_STORE_CONNECT_TEAM_ID }}'
          APP_STORE_CONNECT_APPLE_ID: '${{ secrets.APP_STORE_CONNECT_APPLE_ID }}'
          APP_STORE_CONNECT_BUNDLE_IDENTIFIER: '${{ secrets.APP_STORE_CONNECT_BUNDLE_IDENTIFIER }}'
          DEVELOPER_PORTAL_TEAM_ID: '${{ secrets.DEVELOPER_PORTAL_TEAM_ID }}'
          KEY_ID: '${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}'
          ISSUER_ID: '${{ secrets.APP_STORE_CONNECT_API_API_ISSUER_ID }}'

  deploy_windows:
    name: Windows App
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
      - name: Enable windows
        run: flutter config --enable-windows-desktop
      - run: flutter doctor -v
      - run: flutter pub get
      - name: Build windows
        run: flutter build windows --release --build-number=${{ needs.prepare.outputs.version_code }}
      - name: Zip files
        run: powershell Compress-Archive build\windows\x64\runner\Release\ windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: windows.zip

  github_release:
    name: Create GitHub Release
    needs: [prepare, deploy_android, deploy_ios, deploy_windows]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download aggregated changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog-aggregated
      - name: Format changelog for GitHub Release
        run: bash "$GITHUB_WORKSPACE/.github/scripts/format_changelog.sh" ${{ needs.prepare.outputs.version_code }} github
        env:
          AGGREGATED_CHANGELOG: ${{ github.workspace }}/changelog_aggregated.json
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}${{ github.ref != 'refs/heads/production' && '-beta' || '' }}+${{ needs.prepare.outputs.version_code }}
          name: v${{ needs.prepare.outputs.version }}${{ github.ref != 'refs/heads/production' && '-beta' || '' }}+${{ needs.prepare.outputs.version_code }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES_GENERATED.md
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/production' }}
          files: windows.zip
